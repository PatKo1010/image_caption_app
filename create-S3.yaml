AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an S3 bucket that triggers events only for image uploads

Parameters:
  BucketName:
    Type: String
    Default: my-image-trigger-bucket
    Description: Name of the new S3 bucket

Resources:
  ImageUploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      NotificationConfiguration: {}  # placeholder; will be added in Lambda stack
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: ["PUT", "POST", "GET"]
            AllowedOrigins: ["*"]
            MaxAge: 3000

Outputs:
  S3BucketName:
    Value: !Ref ImageUploadBucket
    Export:
      Name: ImageUploadBucketName

  S3BucketArn:
    Value: !GetAtt ImageUploadBucket.Arn
    Export:
      Name: ImageUploadBucketArn