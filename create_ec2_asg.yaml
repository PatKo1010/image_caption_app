AWSTemplateFormatVersion: '2010-09-09'
Description: ASG and ALB stack using existing VPC and subnets

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the existing VPC

  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for ALB and ASG
  
  PublicSubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for ALB and ASG

  InstanceSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for EC2 instances
  RdsEc2SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for rds ec2 instances

Resources:
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access to the image caption ALB
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ImageCaptionALBSecurityGroup

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        InstanceType: t3.micro
        KeyName: imageCaptioningKey
        ImageId: ami-0580f448a4ccdfcfb  # Replace with correct AMI for your region
        SecurityGroupIds:
          - !Ref InstanceSecurityGroupId
          - !Ref RdsEc2SecurityGroupId
        IamInstanceProfile:
          Name: Ec2UploadS3
        UserData:
          Fn::Base64: |
            #!/bin/bash
            set -e

            APP_DIR=/home/ec2-user/image_caption_app
            LOG_DIR=$APP_DIR/logs

            yum update -y
            yum install -y python3-pip

            runuser -l ec2-user -c "python3 -m pip install --user \
              flask \
              boto3 \
              gunicorn \
              mysql-connector-python \
              werkzeug \
              google-generativeai"

            mkdir -p $LOG_DIR
            chown -R ec2-user:ec2-user $LOG_DIR

            cd $APP_DIR
            pkill -f "gunicorn.*app:app" || true
            runuser -l ec2-user -c "cd $APP_DIR && nohup python3 -m gunicorn -w 2 -b 0.0.0.0:5000 app:app > $LOG_DIR/gunicorn.log 2>&1 &"

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Subnets: 
        - !Ref PublicSubnetId
        - !Ref PublicSubnetId2
      SecurityGroups: [!Ref ALBSecurityGroup]
      Scheme: internet-facing

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VPCId
      Port: 5000
      Protocol: HTTP
      TargetType: instance
      HealthCheckPath: /gallery

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PublicSubnetId
        - !Ref PublicSubnetId2
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 3
      TargetGroupARNs:
        - !Ref ALBTargetGroup
    

Outputs:
  LoadBalancerURL:
    Value: !GetAtt ALB.DNSName
  ALBSecurityGroupId:
    Value: !Ref ALBSecurityGroup
